<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Participantes - Chincheros</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f5;
  margin:0;
  padding:20px;
  color:#222;
}

.container{
  max-width:950px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}

h1{
  text-align:center;
  color:#145a32;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}

h2{
  background:#145a32;
  color:white;
  padding:11px;
  border-radius:6px;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{
  grid-column:1 / span 2;
}

label{
  font-weight:bold;
  display:block;
  margin-bottom:5px;
}

input, select, textarea{
  width:100%;
  padding:9px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
  font-size:14px;
}

textarea{
  min-height:70px;
}

.checkbox-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 20px;
  margin-top:10px;
}

.checkbox-group label{
  font-weight:normal;
  display:flex;
  align-items:center;
  gap:8px;
}

.checkbox-group input{
  width:auto;
}

.gps-box{
  background:#eef8f0;
  padding:12px;
  border-left:5px solid #145a32;
  border-radius:6px;
  margin-top:10px;
}

button{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#145a32;
  color:white;
  border:none;
  border-radius:8px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0e3f23;
}

.secondary-btn{
  background:#2e7d32;
}

@media(max-width:700px){
  .grid, .checkbox-group{
    grid-template-columns:1fr;
  }
  .full{
    grid-column:1;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Registro de Participantes - Chincheros</h1>
<p class="subtitle">Base de datos productiva, comercial y territorial</p>

<form id="registro">

<h2>1. Identificación</h2>

<div class="grid">
  <div>
    <label>Nombres y apellidos</label>
    <input type="text" name="nombres" required>
  </div>

  <div>
    <label>DNI</label>
    <input type="text" name="dni" maxlength="8">
  </div>

  <div>
    <label>Edad</label>
    <input type="number" name="edad">
  </div>

  <div>
    <label>Celular</label>
    <input type="text" name="celular">
  </div>

  <div>
    <label>¿Usa WhatsApp?</label>
    <select name="whatsapp">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>Comunidad / Sector</label>
    <input type="text" name="comunidad">
  </div>

  <div>
    <label>Distrito</label>
    <input type="text" name="distrito">
  </div>
</div>

<h2>2. Perfil del participante</h2>

<div class="grid">
  <div>
    <label>Actividad principal</label>
    <input type="text" name="actividad_principal" placeholder="Agricultura, ganadería, comercio, otro">
  </div>

  <div>
    <label>¿Es productor agrícola?</label>
    <select name="productor_agricola">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>Tenencia del terreno</label>
    <select name="tenencia_terreno">
      <option value="">Seleccionar</option>
      <option>Propio</option>
      <option>Familiar</option>
      <option>Alquilado</option>
      <option>Comunal</option>
      <option>No tiene terreno</option>
      <option>Otro</option>
    </select>
  </div>

  <div>
    <label>Área total disponible (ha)</label>
    <input type="number" step="0.01" name="area_total">
  </div>

  <div>
    <label>Área actualmente cultivada (ha)</label>
    <input type="number" step="0.01" name="area_cultivada">
  </div>

  <div>
    <label>¿Tiene acceso a agua?</label>
    <select name="acceso_agua">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>Tipo de riego actual</label>
    <select name="tipo_riego">
      <option value="">Seleccionar</option>
      <option>Secano</option>
      <option>Gravedad</option>
      <option>Aspersión</option>
      <option>Goteo</option>
      <option>Otro</option>
    </select>
  </div>

  <div>
    <label>¿Pertenece a asociación o cooperativa?</label>
    <select name="pertenece_asociacion">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div class="full">
    <label>Nombre de la asociación / cooperativa</label>
    <input type="text" name="nombre_asociacion">
  </div>
</div>

<h2>3. Producción agrícola</h2>

<div class="grid">
  <div class="full">
    <label>Cultivos actuales</label>
    <textarea name="cultivos_actuales" placeholder="Ejemplo: palta, papa, maíz, café, hortalizas"></textarea>
  </div>

  <div>
    <label>Cultivo principal</label>
    <input type="text" name="cultivo_principal">
  </div>

  <div>
    <label>Producción aproximada por campaña/año</label>
    <input type="text" name="produccion_aprox" placeholder="kg, sacos, cajas, toneladas">
  </div>

  <div>
    <label>Meses de cosecha</label>
    <input type="text" name="meses_cosecha" placeholder="Ejemplo: mayo - agosto">
  </div>

  <div>
    <label>Calidad predominante</label>
    <select name="calidad_produce">
      <option value="">Seleccionar</option>
      <option>Primera</option>
      <option>Segunda</option>
      <option>Descarte</option>
      <option>Mixta</option>
    </select>
  </div>

  <div>
    <label>¿Usa fertilizantes?</label>
    <select name="usa_fertilizantes">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Recibe asistencia técnica?</label>
    <select name="asistencia_tecnica">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>
</div>

<h2>4. Comercialización</h2>

<div class="grid">
  <div>
    <label>¿Qué producto vende más?</label>
    <input type="text" name="producto_vende_mas">
  </div>

  <div>
    <label>¿A quién vende actualmente?</label>
    <select name="a_quien_vende">
      <option value="">Seleccionar</option>
      <option>Intermediario</option>
      <option>Mercado local</option>
      <option>Mayorista</option>
      <option>Asociación</option>
      <option>Consumidor final</option>
      <option>Otro</option>
    </select>
  </div>

  <div>
    <label>Precio promedio recibido</label>
    <input type="text" name="precio_promedio" placeholder="S/ por kg, saco, caja, etc.">
  </div>

  <div>
    <label>Frecuencia de venta</label>
    <select name="frecuencia_venta">
      <option value="">Seleccionar</option>
      <option>Semanal</option>
      <option>Quincenal</option>
      <option>Mensual</option>
      <option>Por campaña</option>
      <option>Eventual</option>
    </select>
  </div>

  <div class="full">
    <label>Principal problema para vender</label>
    <textarea name="problema_venta"></textarea>
  </div>

  <div>
    <label>¿Le interesaría vender en conjunto?</label>
    <select name="vender_conjunto">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Vendería a un acopiador formal si paga mejor?</label>
    <select name="acopiador_formal">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
      <option>Depende del precio</option>
    </select>
  </div>
</div>

<h2>5. Potencial para proyectos</h2>

<div class="grid">
  <div>
    <label>¿Tiene interés en mejorar su cultivo actual?</label>
    <select name="mejorar_cultivo">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Tiene interés en ampliar su área de cultivo?</label>
    <select name="ampliar_area">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Tiene interés en incorporar nuevos cultivos?</label>
    <select name="nuevos_cultivos">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Participaría en capacitaciones?</label>
    <select name="capacitaciones">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>¿Aceptaría visitas técnicas a su parcela?</label>
    <select name="visitas_tecnicas">
      <option value="">Seleccionar</option>
      <option>Sí</option>
      <option>No</option>
    </select>
  </div>
</div>

<br>

<label>Cultivos de interés</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="cultivos_interes" value="Palta"> Palta</label>
  <label><input type="checkbox" name="cultivos_interes" value="Café"> Café</label>
  <label><input type="checkbox" name="cultivos_interes" value="Ají"> Ají</label>
  <label><input type="checkbox" name="cultivos_interes" value="Papa"> Papa</label>
  <label><input type="checkbox" name="cultivos_interes" value="Maíz"> Maíz</label>
  <label><input type="checkbox" name="cultivos_interes" value="Hortalizas"> Hortalizas</label>
  <label><input type="checkbox" name="cultivos_interes" value="Frutales"> Frutales</label>
  <label><input type="checkbox" name="cultivos_interes" value="Otro"> Otro</label>
</div>

<h2>6. Necesidades e intereses</h2>

<div class="checkbox-group">
  <label><input type="checkbox" name="necesidades_intereses" value="Riego tecnificado"> Riego tecnificado</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Fertilización"> Fertilización</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Control de plagas"> Control de plagas</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Comercialización"> Comercialización</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Acceso a financiamiento"> Acceso a financiamiento</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Cultivos de alto valor"> Cultivos de alto valor</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Transformación de productos"> Transformación de productos</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Asociatividad"> Asociatividad</label>
  <label><input type="checkbox" name="necesidades_intereses" value="Tecnología agrícola"> Tecnología agrícola</label>
</div>

<h2>7. Ubicación</h2>

<div class="grid">
  <div class="full">
    <label>Referencia de parcela</label>
    <input type="text" name="referencia_parcela" placeholder="Comunidad, sector, camino, punto de referencia">
  </div>

  <div>
    <label>Latitud</label>
    <input type="text" name="latitud" id="latitud" readonly>
  </div>

  <div>
    <label>Longitud</label>
    <input type="text" name="longitud" id="longitud" readonly>
  </div>
</div>

<button type="button" class="secondary-btn" onclick="obtenerGPS()">Obtener ubicación GPS</button>

<div class="gps-box" id="gps_estado">
  GPS pendiente de registrar.
</div>

<br>

<label>Observaciones del encuestador</label>
<textarea name="observaciones"></textarea>

<h2>8. Autorización</h2>

<label>
  <input type="checkbox" name="autorizacion" value="Sí" required style="width:auto;">
  Autorizo el uso de mis datos para fines de capacitación, asistencia técnica, proyectos productivos y oportunidades de comercialización.
</label>

<button type="submit">Guardar Registro</button>

</form>

</div>

<script>
function obtenerGPS(){
  const estado = document.getElementById("gps_estado");

  if(!navigator.geolocation){
    estado.innerHTML = "Este dispositivo no permite obtener GPS.";
    return;
  }

  estado.innerHTML = "Obteniendo ubicación...";

  navigator.geolocation.getCurrentPosition(
    function(pos){
      document.getElementById("latitud").value = pos.coords.latitude;
      document.getElementById("longitud").value = pos.coords.longitude;
      estado.innerHTML = "GPS registrado correctamente.";
    },
    function(){
      estado.innerHTML = "No se pudo obtener GPS. Verifica permisos de ubicación.";
    }
  );
}

document.getElementById("registro").addEventListener("submit", async function(e){

  e.preventDefault();

  const datos = {};
  const formData = new FormData(this);

  formData.forEach((valor, llave) => {
    if(datos[llave]){
      datos[llave] = datos[llave] + ", " + valor;
    } else {
      datos[llave] = valor;
    }
  });

  await fetch(
    "https://script.google.com/macros/s/AKfycbwuaXzdw_jC8ZK86zz11AEpUm4vtQG6P_fV8KrE38y7Cdsxi0kKLH6URPoVB00mKGRG/exec",
    {
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(datos)
    }
  );

  alert("Registro guardado correctamente");
  this.reset();

  document.getElementById("latitud").value = "";
  document.getElementById("longitud").value = "";
  document.getElementById("gps_estado").innerHTML = "GPS pendiente de registrar.";
});
</script>

</body>
</html>
